<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Product Review</h1>
    <form method="get" action="review.html">
        <label for="product-name">Product Name:</label>
        <select id="product-name" name="product-name" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <fieldset>
            <legend>Overall Rating:</legend>
            <label>
                <input type="radio" name="rating" value="1" required> 1 ☆
            </label>
            <label>
                <input type="radio" name="rating" value="2"> 2 ☆☆
            </label>
            <label>
                <input type="radio" name="rating" value="3"> 3 ☆☆☆
            </label>
            <label>
                <input type="radio" name="rating" value="4"> 4 ☆☆☆☆
            </label>
            <label>
                <input type="radio" name="rating" value="5"> 5 ☆☆☆☆☆
            </label>
        </fieldset>

        <label for="installation-date">Date of Installation:</label>
        <input type="date" id="installation-date" name="installation-date" required>

        <fieldset>
            <legend>Useful Features:</legend>
            <label>
                <input type="checkbox" id="feature1" name="features" value="Feature 1"> Feature 1
            </label>
            <label>
                <input type="checkbox" id="feature2" name="features" value="Feature 2"> Feature 2
            </label>
            <label>
                <input type="checkbox" id="feature3" name="features" value="Feature 3"> Feature 3
            </label>
        </fieldset>

        <label for="written-review">Written Review:</label>
        <textarea id="written-review" name="written-review"></textarea>

        <label for="user-name">User Name:</label>
        <input type="text" id="user-name" name="user-name">

        <input type="submit" value="Submit Review">
    </form>

    <footer>
        <p>Common Footer Content</p>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
